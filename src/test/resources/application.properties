# application-test.properties for gateway-service
spring.cloud.config.enabled=false
spring.profiles.active=dev
spring.application.name=gateway-service

# CORS configuration
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:4200}

# Security / OAuth2 Resourceserver configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=${AUTH_SERVER_URL:http://localhost:9000}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AUTH_SERVER_URL:http://localhost:9000}/oauth2/jwks

# Security / OAuth2 Client configuration
spring.security.oauth2.client.id=${OAUTH_CLIENT_ID:authentification-service-client}
spring.security.oauth2.client.secret=${OAUTH_CLIENT_SECRET:authentification-service-secret}

# Gateway Settings
spring.cloud.gateway.httpclient.connect-timeout=5000
spring.cloud.gateway.httpclient.response-timeout=5s
spring.cloud.gateway.discovery.locator.enabled=false

# Resilience4j default config
resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true
resilience4j.circuitbreaker.configs.default.slidingWindowSize=10
resilience4j.circuitbreaker.configs.default.minimumNumberOfCalls=5
resilience4j.circuitbreaker.configs.default.failureRateThreshold=50
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=10s

# Management Endpoints
management.endpoints.web.exposure.include=health,info,metrics,prometheus,env
management.endpoint.health.show-details=always
